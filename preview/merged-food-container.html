<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — Merged Food Container (Rectangular + Square)</title>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
  :root {
    --sage-100: #abbeb2; --sage-300: #6a9d7d; --sage-500: #317a4d;
    --sage-700: #005020; --sage-900: #003114;
    --cream: #F7F6F0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter var', 'Inter', sans-serif;
    background: var(--cream); color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }

  .badge {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: var(--sage-700); color: var(--cream);
    text-align: center; padding: 10px 16px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
  }
  .badge span { opacity: 0.6; font-weight: 400; }

  .area { max-width: 860px; margin: 72px auto 60px; padding: 0 24px; }

  /* Tab strip */
  .tab-strip {
    display: flex; position: relative;
    border-bottom: 2px solid rgba(0,0,0,0.06);
  }
  .tab-btn {
    padding: 14px 24px 16px; font-size: 0.9rem; font-weight: 500;
    cursor: pointer; border: none; background: transparent;
    color: rgba(0,0,0,0.35); transition: color 0.2s ease;
    font-family: inherit;
  }
  .tab-btn.active { color: var(--sage-700); font-weight: 600; }
  .tab-indicator {
    position: absolute; bottom: -2px; height: 2.5px;
    background: var(--sage-700); border-radius: 2px;
  }

  .wall-desc {
    font-size: 0.875rem; color: rgba(0,0,0,0.5);
    line-height: 1.6; margin: 20px 0 24px;
  }

  /* Card */
  .card {
    background: white; border-radius: 16px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    padding: 28px; margin-bottom: 20px;
  }
  .card-label {
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--sage-500); margin-bottom: 20px;
  }

  /* Table */
  .spec-table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  .spec-table th {
    text-align: left; padding: 10px 16px; font-weight: 600;
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.05em; color: rgba(0,0,0,0.35);
  }
  .spec-table thead { border-bottom: 2px solid rgba(0,0,0,0.08); }
  .spec-table td { padding: 12px 16px; font-size: 0.875rem; color: rgba(0,0,0,0.55); }
  .spec-table td:first-child { font-weight: 500; color: black; white-space: nowrap; }
  .spec-table tbody tr { border-top: 1px solid rgba(0,0,0,0.05); }
  .spec-table tbody tr:hover { background: var(--cream); }
  .spec-table td.dim-col { white-space: nowrap; }

  /* Subcategory divider */
  .spec-table .subcat-row td {
    padding: 24px 16px 10px;
    border-top: 2px solid rgba(0,0,0,0.06);
    background: transparent;
  }
  .spec-table .subcat-row:hover { background: transparent; }
  .subcat-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--sage-700);
    background: rgba(0,80,32,0.07);
    padding: 4px 12px; border-radius: 999px;
  }

  /* Add button */
  .add-btn {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--sage-700); font-size: 0.75rem; font-weight: 600;
    background: none; border: none; cursor: pointer;
    font-family: inherit; transition: color 0.15s;
  }
  .add-btn:hover { color: var(--sage-900); }

  @keyframes row-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .row-anim { opacity: 0; animation: row-in 0.3s ease-out forwards; }
</style>
</head>
<body>
<div class="badge">Preview — Merged Food Container <span>| Rectangular + Square in one tab with subcategory dividers</span></div>

<div class="area">
  <div class="tab-strip">
    <button class="tab-btn">Salad Bowl</button>
    <button class="tab-btn">Soup Container</button>
    <button class="tab-btn active">Food Container</button>
    <button class="tab-btn">Paper Box</button>
    <button class="tab-btn">Compartment Box</button>
    <button class="tab-btn">Food Tray</button>
    <div class="tab-indicator" style="left:258px; width:130px;"></div>
  </div>
  <p class="wall-desc">Kraft food containers for meal prep, deli, and takeaway. Available in rectangular and square shapes with PP, PET, or paper lids.</p>

  <div class="card">
    <p class="card-label">Available Sizes</p>
    <div style="overflow-x:auto;">
      <table class="spec-table" id="table"></table>
    </div>
  </div>
</div>

<script>
var HEADERS = [
  ['Size', '12%'],
  ['Shape', '11%'],
  ['L \u00d7 W \u00d7 H', '18%'],
  ['Pcs / Case', '11%'],
  ['Carton (L \u00d7 W \u00d7 H)', '34%'],
  ['', '14%']
];

var DATA = [
  /* Rectangular containers */
  { size: '240 ml',  shape: 'Rectangular', dim: '140 \u00d7 103 \u00d7 46 mm',  pcs: '300', carton: '440 \u00d7 210 \u00d7 430 mm' },
  { size: '360 ml',  shape: 'Rectangular', dim: '140 \u00d7 103 \u00d7 55 mm',  pcs: '300', carton: '440 \u00d7 210 \u00d7 430 mm' },
  { size: '500 ml',  shape: 'Rectangular', dim: '172 \u00d7 120 \u00d7 47 mm',  pcs: '300', carton: '500 \u00d7 250 \u00d7 485 mm' },
  { size: '650 ml',  shape: 'Rectangular', dim: '172 \u00d7 120 \u00d7 51 mm',  pcs: '300', carton: '500 \u00d7 250 \u00d7 485 mm' },
  { size: '750 ml',  shape: 'Rectangular', dim: '172 \u00d7 120 \u00d7 57 mm',  pcs: '300', carton: '500 \u00d7 250 \u00d7 495 mm' },
  { size: '850 ml',  shape: 'Rectangular', dim: '172 \u00d7 120 \u00d7 63 mm',  pcs: '300', carton: '500 \u00d7 250 \u00d7 495 mm' },
  { size: '1000 ml', shape: 'Rectangular', dim: '172 \u00d7 120 \u00d7 78 mm',  pcs: '300', carton: '500 \u00d7 250 \u00d7 515 mm' },
  /* Rectangular lids */
  { subcat: 'Rectangular Lids' },
  { size: 'PP Lid',    shape: 'Rectangular', dim: '140 \u00d7 103 mm', pcs: '300', carton: '440 \u00d7 260 \u00d7 225 mm' },
  { size: 'PET Lid',   shape: 'Rectangular', dim: '172 \u00d7 120 mm', pcs: '300', carton: '555 \u00d7 270 \u00d7 270 mm' },
  { size: 'PP Lid',    shape: 'Rectangular', dim: '172 \u00d7 120 mm', pcs: '300', carton: '530 \u00d7 250 \u00d7 350 mm' },
  { size: 'Paper Lid', shape: 'Rectangular', dim: '172 \u00d7 120 mm', pcs: '300', carton: '530 \u00d7 350 \u00d7 510 mm' },
  /* Square bowls */
  { subcat: 'Square Bowl' },
  { size: '500 ml',  shape: 'Square', dim: '131 \u00d7 48.5 \u00d7 113 mm',   pcs: '300', carton: '410 \u00d7 280 \u00d7 410 mm' },
  { size: '750 ml',  shape: 'Square', dim: '168 \u00d7 45 \u00d7 149 mm',     pcs: '300', carton: '530 \u00d7 350 \u00d7 420 mm' },
  { size: '800 ml',  shape: 'Square', dim: '145.5 \u00d7 55 \u00d7 122.5 mm', pcs: '300', carton: '465 \u00d7 315 \u00d7 425 mm' },
  { size: '1000 ml', shape: 'Square', dim: '168 \u00d7 55 \u00d7 149 mm',     pcs: '300', carton: '530 \u00d7 350 \u00d7 420 mm' },
  { size: '1100 ml', shape: 'Square', dim: '151 \u00d7 74 \u00d7 122.5 mm',   pcs: '300', carton: '460 \u00d7 310 \u00d7 450 mm' },
  { size: '1200 ml', shape: 'Square', dim: '168 \u00d7 66 \u00d7 146.5 mm',   pcs: '300', carton: '540 \u00d7 360 \u00d7 440 mm' },
  { size: '1400 ml', shape: 'Square', dim: '170 \u00d7 76 \u00d7 146.5 mm',   pcs: '300', carton: '540 \u00d7 360 \u00d7 460 mm' },
  /* Square lids */
  { subcat: 'Square Lids' },
  { size: 'PET Lid', shape: 'Square', dim: '131 \u00d7 131 mm', pcs: '300', carton: '480 \u00d7 135 \u00d7 270 mm' },
  { size: 'PET Lid', shape: 'Square', dim: '168 \u00d7 168 mm', pcs: '300', carton: '480 \u00d7 175 \u00d7 350 mm' },
  { size: 'PET Lid', shape: 'Square', dim: '170 \u00d7 170 mm', pcs: '300', carton: '390 \u00d7 390 \u00d7 200 mm' },
];

var table = document.getElementById('table');

/* thead */
var thead = document.createElement('thead');
var htr = document.createElement('tr');
HEADERS.forEach(function(h) {
  var th = document.createElement('th');
  th.textContent = h[0];
  th.style.width = h[1];
  htr.appendChild(th);
});
thead.appendChild(htr);
table.appendChild(thead);

/* tbody */
var tbody = document.createElement('tbody');
var delay = 0;

DATA.forEach(function(item) {
  var tr = document.createElement('tr');
  tr.className = 'row-anim';
  tr.style.animationDelay = delay + 's';
  delay += 0.03;

  if (item.subcat) {
    tr.className += ' subcat-row';
    var td = document.createElement('td');
    td.colSpan = 6;
    var badge = document.createElement('span');
    badge.className = 'subcat-badge';
    badge.textContent = item.subcat;
    td.appendChild(badge);
    tr.appendChild(td);
    tbody.appendChild(tr);
    return;
  }

  var tdSize = document.createElement('td');
  tdSize.textContent = item.size;

  var tdShape = document.createElement('td');
  tdShape.textContent = item.shape;

  var tdDim = document.createElement('td');
  tdDim.className = 'dim-col';
  tdDim.textContent = item.dim;

  var tdPcs = document.createElement('td');
  tdPcs.textContent = item.pcs;

  var tdCarton = document.createElement('td');
  tdCarton.className = 'dim-col';
  tdCarton.textContent = item.carton;

  var tdAction = document.createElement('td');
  tdAction.style.textAlign = 'right';
  tdAction.style.width = '70px';
  var btn = document.createElement('button');
  btn.className = 'add-btn';
  btn.textContent = '+ Add';
  tdAction.appendChild(btn);

  tr.appendChild(tdSize);
  tr.appendChild(tdShape);
  tr.appendChild(tdDim);
  tr.appendChild(tdPcs);
  tr.appendChild(tdCarton);
  tr.appendChild(tdAction);
  tbody.appendChild(tr);
});

table.appendChild(tbody);
</script>
</body>
</html>
