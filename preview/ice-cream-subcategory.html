<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — Ice Cream Subcategory in Single Wall</title>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
  :root {
    --sage-100: #abbeb2; --sage-300: #6a9d7d; --sage-500: #317a4d;
    --sage-700: #005020; --sage-900: #003114;
    --cream: #F7F6F0; --cream-dark: #ECEAE3;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter var', 'Inter', sans-serif;
    background: var(--cream); color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--sage-300); color: white; }

  .badge {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: var(--sage-700); color: var(--cream);
    text-align: center; padding: 10px 16px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
  }
  .badge span { opacity: 0.6; font-weight: 400; }

  .area { max-width: 820px; margin: 72px auto 60px; padding: 0 24px; }

  /* Tab strip */
  .tab-strip {
    display: flex; position: relative;
    border-bottom: 2px solid rgba(0,0,0,0.06);
  }
  .tab-btn {
    padding: 14px 24px 16px; font-size: 0.9rem; font-weight: 500;
    cursor: pointer; border: none; background: transparent;
    color: rgba(0,0,0,0.35); transition: color 0.2s ease;
    font-family: inherit;
  }
  .tab-btn.active { color: var(--sage-700); font-weight: 600; }
  .tab-indicator {
    position: absolute; bottom: -2px; height: 2.5px;
    background: var(--sage-700); border-radius: 2px;
  }

  .wall-desc {
    font-size: 0.875rem; color: rgba(0,0,0,0.5);
    line-height: 1.6; margin: 20px 0 24px;
  }

  /* Card */
  .card {
    background: white; border-radius: 16px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    padding: 28px; margin-bottom: 20px;
  }
  .card-label {
    font-family: 'Inter Display var', 'Inter Display', 'Inter var', sans-serif;
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--sage-500); margin-bottom: 20px;
  }

  /* Table */
  .spec-table { border-collapse: collapse; width: 100%; }
  .spec-table th {
    text-align: left; padding: 10px 16px; font-weight: 600;
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.05em; color: rgba(0,0,0,0.35);
  }
  .spec-table thead { border-bottom: 2px solid rgba(0,0,0,0.08); }
  .spec-table td { padding: 12px 16px; font-size: 0.875rem; color: rgba(0,0,0,0.55); }
  .spec-table td:first-child { font-weight: 500; color: black; }
  .spec-table tbody tr { border-top: 1px solid rgba(0,0,0,0.05); }
  .spec-table tbody tr:hover { background: var(--cream); }

  /* Subcategory divider row */
  .spec-table .subcat-row td {
    padding: 24px 16px 10px;
    border-top: 2px solid rgba(0,0,0,0.06);
    background: transparent;
  }
  .spec-table .subcat-row:hover td { background: transparent; }

  .subcat-wrap { display: flex; align-items: center; }
  .subcat-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--sage-700);
    background: rgba(0,80,32,0.07);
    padding: 4px 12px; border-radius: 999px;
  }
  /* line removed per user request */

  /* Ice cream rows get a barely-there tint */
  .spec-table .ice-cream-row { background: rgba(0,80,32,0.015); }
  .spec-table .ice-cream-row:hover { background: rgba(0,80,32,0.04); }

  @keyframes row-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .row-anim { opacity: 0; animation: row-in 0.3s ease-out forwards; }
</style>
</head>
<body>
<div class="badge">Preview — Ice Cream Subcategory in Single Wall <span>| Scroll down to see the ice cream divider after 22 oz</span></div>

<div class="area">
  <div class="tab-strip">
    <button class="tab-btn active">Single Wall</button>
    <button class="tab-btn">Double Wall</button>
    <button class="tab-btn">Ripple Wall</button>
    <div class="tab-indicator" style="left:0; width:110px;"></div>
  </div>
  <p class="wall-desc">Standard single-layer construction. Lightweight and cost-effective. Best for cold or warm beverages, or when paired with a sleeve.</p>

  <div class="card">
    <p class="card-label">Available Sizes</p>
    <div style="overflow-x:auto;">
      <table class="spec-table" id="table"></table>
    </div>
  </div>
</div>

<script>
var HEADERS = ['Size', 'Top Dia.', 'Pcs / Case', 'Carton (L \u00d7 W \u00d7 H)', 'CBM'];

var STANDARD = [
  ['2.5 oz','51 mm','1,000','260 \u00d7 205 \u00d7 290 mm','0.0155'],
  ['3 oz','55 mm','1,000','280 \u00d7 225 \u00d7 290 mm','0.0183'],
  ['4 oz','62 mm','1,000','310 \u00d7 250 \u00d7 290 mm','0.0225'],
  ['5 oz','63 mm','1,000','320 \u00d7 255 \u00d7 290 mm','0.0237'],
  ['6 oz','68 mm','1,000','340 \u00d7 280 \u00d7 290 mm','0.0276'],
  ['7 oz','73 mm','1,000','370 \u00d7 300 \u00d7 320 mm','0.0355'],
  ['7.5 oz','70 mm','1,000','355 \u00d7 280 \u00d7 340 mm','0.0338'],
  ['8 oz','75 mm','1,000','380 \u00d7 300 \u00d7 340 mm','0.0388'],
  ['8 oz','80 mm','1,000','400 \u00d7 325 \u00d7 385 mm','0.0501'],
  ['9 oz','77 mm','1,000','390 \u00d7 310 \u00d7 350 mm','0.0423'],
  ['10 oz','80 mm','1,000','400 \u00d7 320 \u00d7 400 mm','0.0512'],
  ['10 oz','90 mm','1,000','455 \u00d7 365 \u00d7 480 mm','0.0797'],
  ['12 oz','90 mm','1,000','455 \u00d7 365 \u00d7 465 mm','0.0772'],
  ['16 oz','90 mm','1,000','455 \u00d7 365 \u00d7 530 mm','0.0880'],
  ['20 oz','90 mm','1,000','455 \u00d7 365 \u00d7 610 mm','0.1013'],
  ['22 oz','90 mm','1,000','455 \u00d7 365 \u00d7 615 mm','0.1021'],
];

var ICE_CREAM = [
  ['4 oz','74 mm','1,000','380 \u00d7 305 \u00d7 360 mm','0.0417'],
  ['6 oz','90 mm','1,000','465 \u00d7 365 \u00d7 370 mm','0.0628'],
  ['8 oz','95 mm','1,000','480 \u00d7 380 \u00d7 480 mm','0.0876'],
];

var table = document.getElementById('table');

/* thead */
var thead = document.createElement('thead');
var htr = document.createElement('tr');
HEADERS.forEach(function(h) {
  var th = document.createElement('th');
  th.textContent = h;
  htr.appendChild(th);
});
thead.appendChild(htr);
table.appendChild(thead);

/* tbody */
var tbody = document.createElement('tbody');
var delay = 0;

function addRow(data, cls) {
  var tr = document.createElement('tr');
  tr.className = 'row-anim' + (cls ? ' ' + cls : '');
  tr.style.animationDelay = delay + 's';
  delay += 0.03;
  data.forEach(function(val, ci) {
    var td = document.createElement('td');
    td.textContent = val;
    if (ci === 3) td.style.whiteSpace = 'nowrap';
    tr.appendChild(td);
  });
  tbody.appendChild(tr);
}

/* Standard rows */
STANDARD.forEach(function(row) { addRow(row, ''); });

/* Subcategory divider */
var divRow = document.createElement('tr');
divRow.className = 'subcat-row row-anim';
divRow.style.animationDelay = delay + 's';
delay += 0.03;

var divTd = document.createElement('td');
divTd.colSpan = 5;

var wrap = document.createElement('div');
wrap.className = 'subcat-wrap';

var badgeEl = document.createElement('span');
badgeEl.className = 'subcat-badge';

/* Ice cream cone icon via SVG DOM */
var svgNS = 'http://www.w3.org/2000/svg';
var svg = document.createElementNS(svgNS, 'svg');
svg.setAttribute('width', '11');
svg.setAttribute('height', '11');
svg.setAttribute('viewBox', '0 0 24 24');
svg.setAttribute('fill', 'none');
svg.setAttribute('stroke', 'currentColor');
svg.setAttribute('stroke-width', '2.2');
svg.setAttribute('stroke-linecap', 'round');
svg.setAttribute('stroke-linejoin', 'round');
var circle = document.createElementNS(svgNS, 'circle');
circle.setAttribute('cx', '12');
circle.setAttribute('cy', '8');
circle.setAttribute('r', '6');
var path1 = document.createElementNS(svgNS, 'path');
path1.setAttribute('d', 'M8.5 13.5 12 22l3.5-8.5');
svg.appendChild(circle);
svg.appendChild(path1);

badgeEl.appendChild(svg);
badgeEl.appendChild(document.createTextNode(' Ice Cream Cup'));

wrap.appendChild(badgeEl);
divTd.appendChild(wrap);
divRow.appendChild(divTd);
tbody.appendChild(divRow);

/* Ice cream rows */
ICE_CREAM.forEach(function(row) { addRow(row, 'ice-cream-row'); });

table.appendChild(tbody);
</script>
</body>
</html>
