<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper / Kraft Button</title>
  <style>
    /* 1. Updated Background Setup */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      /* Changed to solid white, removed the grid gradients */
      background-color: #ffffff; 
    }

    /* 2. The Button Styles (Kept the same to preserve the glass effect) */
    .liquid-glass-btn {
      /* Typography */
      color: #333333; /* I slightly darkened the text so it's readable on a white background! */
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: 1px;
      
      /* Shape and Spacing */
      padding: 20px 80px;
      border-radius: 80px; 
      
      /* The Glass Edge */
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      cursor: pointer;

      /* The Glass Surface */
      background: linear-gradient(
        135deg, 
        rgba(255, 255, 255, 0.4) 0%, 
        rgba(255, 255, 255, 0.1) 100%
      );

      /* The Glass Distortion */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      /* The 3D Liquid Volume */
      box-shadow: 
        0 8px 32px 0 rgba(31, 38, 135, 0.15),       
        inset 0 4px 5px rgba(255, 255, 255, 0.9),   
        inset 0 -4px 5px rgba(0, 0, 0, 0.05);       

      transition: all 0.3s ease; 
    }

    /* 3. Hover Effect */
    .liquid-glass-btn:hover {
      background: linear-gradient(
        135deg, 
        rgba(255, 255, 255, 0.5) 0%, 
        rgba(255, 255, 255, 0.2) 100%
      );
      transform: translateY(-2px); 
      box-shadow: 
        0 12px 36px 0 rgba(31, 38, 135, 0.2), 
        inset 0 4px 5px rgba(255, 255, 255, 1), 
        inset 0 -4px 5px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body>

  <button class="liquid-glass-btn">Paper / Kraft</button>

</body>
</html>
